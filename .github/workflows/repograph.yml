name: RepoGraph CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm build
      - run: pnpm test

  repograph-example-local:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm build

      - name: Run RepoGraph on example (monorepo build)
        working-directory: examples/clean-architecture-csharp-angular
        run: |
          node ../../apps/cli/dist/index.js validate
          node ../../apps/cli/dist/index.js scan
          node ../../apps/cli/dist/index.js check || true
          node ../../apps/cli/dist/index.js list violations
          node ../../apps/cli/dist/index.js diff --base HEAD~1 --head HEAD || true

      - name: Upload graph artifact
        uses: actions/upload-artifact@v4
        with:
          name: repograph-graph-local
          path: examples/clean-architecture-csharp-angular/.repograph/generated/graph.json

  repograph-example-npm:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install published CLI
        run: npm install -g @repographprotocol/cli@0.5.0

      - name: Verify CLI runs
        run: repograph --version

      - name: Run RepoGraph on example (npm package)
        working-directory: examples/clean-architecture-csharp-angular
        run: |
          repograph validate
          repograph scan
          repograph check || true
          repograph list violations

      - name: Upload graph artifact
        uses: actions/upload-artifact@v4
        with:
          name: repograph-graph-npm
          path: examples/clean-architecture-csharp-angular/.repograph/generated/graph.json

  repograph-example-action:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: RepoGraph composite action
        uses: ./action
        with:
          working-directory: examples/clean-architecture-csharp-angular
          fail-on: error
          comment-pr: false
          upload-artifact: true
