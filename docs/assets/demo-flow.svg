<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 320" role="img" aria-label="RepoGraph workflow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .box { fill: #1e293b; stroke: #38bdf8; stroke-width: 2; rx: 12; }
      .title { fill: #f8fafc; font: 700 18px system-ui, sans-serif; }
      .cmd { fill: #e2e8f0; font: 600 13px ui-monospace, monospace; }
      .sub { fill: #94a3b8; font: 400 12px system-ui, sans-serif; }
      .arrow { stroke: #38bdf8; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="920" height="320" fill="url(#bg)"/>
  <text x="24" y="36" class="title">RepoGraph in 30 seconds</text>
  <text x="24" y="58" class="sub">init ’ scan ’ check ’ export context for AI + CI</text>

  <rect class="box" x="24" y="88" width="200" height="88"/>
  <text x="40" y="118" class="cmd">repograph init</text>
  <text x="40" y="142" class="sub">.repograph/*.yml</text>
  <text x="40" y="162" class="sub">modules + layers</text>

  <rect class="box" x="260" y="88" width="200" height="88"/>
  <text x="276" y="118" class="cmd">repograph scan</text>
  <text x="276" y="142" class="sub">graph.json</text>
  <text x="276" y="162" class="sub">violations</text>

  <rect class="box" x="496" y="88" width="200" height="88"/>
  <text x="512" y="118" class="cmd">repograph check</text>
  <text x="512" y="142" class="sub">CI gate</text>
  <text x="512" y="162" class="sub">layer rules</text>

  <rect class="box" x="732" y="88" width="164" height="88"/>
  <text x="748" y="118" class="cmd">export</text>
  <text x="748" y="142" class="sub">Cursor / MD</text>
  <text x="748" y="162" class="sub">MCP tools</text>

  <path class="arrow" d="M224 132 H260"/>
  <path class="arrow" d="M460 132 H496"/>
  <path class="arrow" d="M696 132 H732"/>

  <rect class="box" x="24" y="210" width="872" height="88"/>
  <text x="40" y="240" class="cmd">GitHub Action: validate · scan · check · PR comment</text>
  <text x="40" y="264" class="sub">npm install -g @repographprotocol/cli@0.2.1</text>
  <text x="40" y="284" class="sub">Replace this SVG with a recorded demo.gif when available  see docs/assets/RECORD_DEMO.md</text>
</svg>
