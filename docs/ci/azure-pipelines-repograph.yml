# RepoGraph architecture check for Azure DevOps Pipelines
# Add as azure-pipelines.yml or include via template

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: "22.x"
    displayName: Install Node.js

  - script: npm install -g @repographprotocol/cli@0.5.0
    displayName: Install RepoGraph CLI

  - script: repograph validate
    displayName: Validate .repograph config
    workingDirectory: $(Build.SourcesDirectory)

  - script: repograph scan
    displayName: Scan repository
    workingDirectory: $(Build.SourcesDirectory)

  - script: repograph check
    displayName: Architecture check
    workingDirectory: $(Build.SourcesDirectory)

  - task: PublishPipelineArtifact@1
    displayName: Publish graph artifact
    inputs:
      targetPath: $(Build.SourcesDirectory)/.repograph/generated
      artifact: repograph-generated
    condition: succeeded()
